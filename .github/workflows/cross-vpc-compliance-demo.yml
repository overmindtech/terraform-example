name: Cross-VPC Compliance Demo - Create Needle PRs

on:
  workflow_dispatch: {}

concurrency:
  group: cross-vpc-compliance-demo
  cancel-in-progress: false

jobs:
  cleanup-old-branches:
    name: Delete stale demo branches and changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Delete stale demo branches
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin
          git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -E '^(security/jira-4521-narrow-internal-cidr-|demo/cross-vpc-sg-narrowing-with-knowledge|signals-demo/needle-)' \
            | while read -r branch; do
                echo "Deleting stale branch: $branch"
                git push origin --delete "$branch" || echo "Could not delete $branch (may already be gone)"
              done

      - uses: overmindtech/actions/install-cli@main
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete stale Overmind changes from previous demo runs
        env:
          OVM_API_KEY: ${{ secrets.OVM_API_KEY }}
        run: |
          # Wipe every change from previous runs so that, once this run's
          # two PRs are created below, they're the only "narrow internal
          # ingress" changes left in Overmind - keeps the demo tidy when
          # presenting.
          .github/scripts/overmind-cleanup-changes.sh --keep 0

  create-prs:
    name: Create needle PRs (no-knowledge + with-knowledge)
    runs-on: ubuntu-latest
    needs: cleanup-old-branches
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure Git
        run: |
          git config user.name "Platform Automation"
          git config user.email "platform-automation@company.com"

      - name: Needle scenario - narrow internal CIDR
        run: |
          python3 .github/scripts/update-internal-cidr.py main.tf "10.0.0.0/16" "SECURITY HARDENING: Narrowed to VPC CIDR per audit findings (JIRA-4521)"
          terraform fmt -no-color main.tf

      - name: Show changes
        run: |
          echo "## Changes to main.tf" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff main.tf >> $GITHUB_STEP_SUMMARY || echo "No changes detected"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "=== Git diff ==="
          git diff main.tf || echo "No changes detected"

      - name: Create no-knowledge branch, commit, and push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="security/jira-4521-narrow-internal-cidr-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NO_KNOWLEDGE=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"
          git add main.tf

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 1
          fi

          git commit -m "security: narrow internal ingress CIDR (JIRA-4521)"
          git push -u origin "$BRANCH"

      - name: Open pull request (no knowledge file)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BODY="$(printf '%s\n' \
            '## Summary' \
            '- Narrow internal ingress CIDR used for service/monitoring access.' \
            '' \
            '## Context' \
            '- JIRA-4521: Reduce internal exposure based on audit feedback.' \
            '' \
            '## Testing' \
            '- Terraform plan reviewed in CI.' \
            '' \
            '## Rollout / Risk' \
            '- If any internal tooling relies on the broader range, it may lose access; monitor health checks and alarms after merge.' \
          )"

          gh pr create \
            --base main \
            --head "$BRANCH_NO_KNOWLEDGE" \
            --title "security: narrow internal ingress CIDR (JIRA-4521)" \
            --body "$BODY"

      - name: Wait for PR #1's checks before opening PR #2
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # PR #1's "execute" job and PR #2's "execute" job both plan/apply
          # against the same shared tfstate concurrency group. Opening PR #2
          # immediately after PR #1 raced the two: PR #2's request could land
          # while PR #1's execute job was still pending (not yet started),
          # which GitHub Actions treats as a *replacement*, not a queue entry,
          # cancelling PR #1's job outright. Waiting here for PR #1's checks
          # to actually finish removes the race entirely, rather than relying
          # on concurrency queueing behavior to save us.
          BRANCH="$BRANCH_NO_KNOWLEDGE"
          echo "Waiting for checks on $BRANCH to appear..."

          # GitHub Actions typically takes 30-90s to register checks after a
          # PR is created; querying before that returns "no checks reported"
          # (exit 1), not a pending state, so retry until something shows up.
          for i in $(seq 1 18); do
            if [ -n "$(gh pr checks "$BRANCH" --json state -q '.[0].state' 2>/dev/null)" ]; then
              echo "Checks have registered, watching until they finish..."
              break
            fi
            echo "No checks reported yet (attempt $i/18), waiting 10s..."
            sleep 10
          done

          gh pr checks "$BRANCH" --watch --interval 15 || true

      - name: Create with-knowledge branch, add knowledge file, commit, and push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="demo/cross-vpc-sg-narrowing-with-knowledge-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_WITH_KNOWLEDGE=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"

          mkdir -p .overmind/knowledge
          cp .github/scripts/knowledge-templates/cross-vpc-regulated-feed.md .overmind/knowledge/cross-vpc-regulated-feed.md
          git add .overmind/knowledge/cross-vpc-regulated-feed.md

          git commit -m "docs: add cross-VPC regulated feed knowledge for internal-services SG"
          git push -u origin "$BRANCH"

      - name: Open pull request (with knowledge file)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BODY="$(printf '%s\n' \
            '## Summary' \
            '- Narrow internal ingress CIDR used for service/monitoring access.' \
            '- Adds `.overmind/knowledge/cross-vpc-regulated-feed.md` documenting the cross-VPC dependency this change affects.' \
            '' \
            '## Context' \
            '- JIRA-4521: Reduce internal exposure based on audit feedback.' \
            '' \
            '## Testing' \
            '- Terraform plan reviewed in CI.' \
            '' \
            '## Rollout / Risk' \
            '- If any internal tooling relies on the broader range, it may lose access; monitor health checks and alarms after merge.' \
          )"

          gh pr create \
            --base main \
            --head "$BRANCH_WITH_KNOWLEDGE" \
            --title "security: narrow internal ingress CIDR (JIRA-4521) [with knowledge file]" \
            --body "$BODY"
