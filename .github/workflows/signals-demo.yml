name: Signals Demo - Create Needle PRs

on:
  workflow_dispatch: {}

concurrency:
  group: signals-demo
  cancel-in-progress: false

jobs:
  cleanup-old-branches:
    name: Delete stale demo branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Delete stale demo branches
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin
          git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -E '^(security/jira-4521-narrow-internal-cidr-|demo/cross-vpc-sg-narrowing-with-knowledge|signals-demo/needle-)' \
            | while read -r branch; do
                echo "Deleting stale branch: $branch"
                git push origin --delete "$branch" || echo "Could not delete $branch (may already be gone)"
              done

  create-prs:
    name: Create needle PRs (no-knowledge + with-knowledge)
    runs-on: ubuntu-latest
    needs: cleanup-old-branches
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure Git
        run: |
          git config user.name "Platform Automation"
          git config user.email "platform-automation@company.com"

      - name: Needle scenario - narrow internal CIDR
        run: |
          python3 .github/scripts/update-internal-cidr.py main.tf "10.0.0.0/16" "SECURITY HARDENING: Narrowed to VPC CIDR per audit findings (JIRA-4521)"
          terraform fmt -no-color main.tf

      - name: Show changes
        run: |
          echo "## Changes to main.tf" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff main.tf >> $GITHUB_STEP_SUMMARY || echo "No changes detected"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "=== Git diff ==="
          git diff main.tf || echo "No changes detected"

      - name: Create no-knowledge branch, commit, and push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="security/jira-4521-narrow-internal-cidr-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NO_KNOWLEDGE=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"
          git add main.tf

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 1
          fi

          git commit -m "security: narrow internal ingress CIDR (JIRA-4521)"
          git push -u origin "$BRANCH"

      - name: Open pull request (no knowledge file)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BODY="$(printf '%s\n' \
            '## Summary' \
            '- Narrow internal ingress CIDR used for service/monitoring access.' \
            '' \
            '## Context' \
            '- JIRA-4521: Reduce internal exposure based on audit feedback.' \
            '' \
            '## Testing' \
            '- Terraform plan reviewed in CI.' \
            '' \
            '## Rollout / Risk' \
            '- If any internal tooling relies on the broader range, it may lose access; monitor health checks and alarms after merge.' \
          )"

          gh pr create \
            --base main \
            --head "$BRANCH_NO_KNOWLEDGE" \
            --title "security: narrow internal ingress CIDR (JIRA-4521)" \
            --body "$BODY"

      - name: Create with-knowledge branch, add knowledge file, commit, and push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="demo/cross-vpc-sg-narrowing-with-knowledge-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_WITH_KNOWLEDGE=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"

          mkdir -p .overmind/knowledge
          cp .github/scripts/knowledge-templates/cross-vpc-regulated-feed.md .overmind/knowledge/cross-vpc-regulated-feed.md
          git add .overmind/knowledge/cross-vpc-regulated-feed.md

          git commit -m "docs: add cross-VPC regulated feed knowledge for internal-services SG"
          git push -u origin "$BRANCH"

      - name: Open pull request (with knowledge file)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BODY="$(printf '%s\n' \
            '## Summary' \
            '- Narrow internal ingress CIDR used for service/monitoring access.' \
            '- Adds `.overmind/knowledge/cross-vpc-regulated-feed.md` documenting the cross-VPC dependency this change affects.' \
            '' \
            '## Context' \
            '- JIRA-4521: Reduce internal exposure based on audit feedback.' \
            '' \
            '## Testing' \
            '- Terraform plan reviewed in CI.' \
            '' \
            '## Rollout / Risk' \
            '- If any internal tooling relies on the broader range, it may lose access; monitor health checks and alarms after merge.' \
          )"

          gh pr create \
            --base main \
            --head "$BRANCH_WITH_KNOWLEDGE" \
            --title "security: narrow internal ingress CIDR (JIRA-4521) [with knowledge file]" \
            --body "$BODY"
